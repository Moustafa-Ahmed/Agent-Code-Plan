        </main>

        <script>
            const STORAGE_KEY = "project-database-v1";
            const state = {
                title: "Project Database",
                items: [],
                editingItemId: null,
                view: "table",
                search: "",
                type: "all",
                status: "all",
                priority: "all",
                sortBy: "createdAt-desc",
                boardControls: {
                    Todo: "createdAt-desc",
                    "In Progress": "priority-desc",
                    Done: "createdAt-desc",
                },
            };

            const priorityValue = { high: 3, medium: 2, low: 1 };

            const nodes = {
                title: document.getElementById("title"),
                summaryChips: document.getElementById("summaryChips"),
                tableBody: document.getElementById("tableBody"),
                boardView: document.getElementById("boardView"),
                tableView: document.getElementById("tableView"),
                tableViewBtn: document.getElementById("tableViewBtn"),
                boardViewBtn: document.getElementById("boardViewBtn"),
                searchInput: document.getElementById("searchInput"),
                typeFilter: document.getElementById("typeFilter"),
                statusFilter: document.getElementById("statusFilter"),
                priorityFilter: document.getElementById("priorityFilter"),
                sortBy: document.getElementById("sortBy"),
                openAddModalBtn: document.getElementById("openAddModalBtn"),
                addModal: document.getElementById("addModal"),
                closeAddModalBtn: document.getElementById("closeAddModalBtn"),
                cancelAddModalBtn: document.getElementById("cancelAddModalBtn"),
                addForm: document.getElementById("addForm"),
                addTitle: document.getElementById("addTitle"),
                addDescription: document.getElementById("addDescription"),
                addAssignee: document.getElementById("addAssignee"),
                editModal: document.getElementById("editModal"),
                closeEditModalBtn: document.getElementById("closeEditModalBtn"),
                cancelEditModalBtn:
                    document.getElementById("cancelEditModalBtn"),
                editForm: document.getElementById("editForm"),
                editTitle: document.getElementById("editTitle"),
                editDescription: document.getElementById("editDescription"),
                editAssignee: document.getElementById("editAssignee"),
                viewModal: document.getElementById("viewModal"),
                closeViewModalBtn: document.getElementById("closeViewModalBtn"),
                dismissViewModalBtn: document.getElementById(
                    "dismissViewModalBtn",
                ),
                viewContent: document.getElementById("viewContent"),
            };

            function normalizeIncomingData(data) {
                const sourceItems = Array.isArray(data.items)
                    ? data.items
                    : data.tasks || [];

                const normalizedItems = sourceItems.map((item, index) => {
                    const text = item.text || item.title || "Untitled";
                    const status = item.status || "Todo";
                    const normalized = {
                        id: item.id || Date.now() + index,
                        title: text,
                        description: item.description || "",
                        type: item.type || "task",
                        status,
                        priority: item.priority || "medium",
                        assignee: item.assignee || "Unassigned",
                        createdAt:
                            item.createdAt ||
                            new Date().toISOString().slice(0, 10),
                    };
                    if (item.updatedAt) {
                        normalized.updatedAt = item.updatedAt;
                    }
                    return normalized;
                });

                return {
                    title: data.title || "Project Database",
                    items: normalizedItems,
                };
            }

            function toClassToken(value) {
                return String(value).replace(/\s+/g, "");
            }

            function isDone(item) {
                return item.status === "Done";
            }

            function getStatusClass(status) {
                if (status === "Done") {
                    return "status-done";
                }

                if (status === "In Progress") {
                    return "status-in-progress";
                }

                return "status-todo";
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function persist() {
                const payload = {
                    view: state.view,
                    sortBy: state.sortBy,
                    boardControls: state.boardControls,
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            }

            function sortRecords(items, sortBy) {
                const [field, direction] = sortBy.split("-");

                items.sort((a, b) => {
                    let left = a[field];
                    let right = b[field];

                    if (field === "priority") {
                        left = priorityValue[left] || 0;
                        right = priorityValue[right] || 0;
                    }

                    if (field === "createdAt") {
                        left = new Date(left).getTime();
                        right = new Date(right).getTime();
                    }

                    if (typeof left === "string" && typeof right === "string") {
                        left = left.toLowerCase();
                        right = right.toLowerCase();
                    }

                    if (left < right) {
                        return direction === "asc" ? -1 : 1;
                    }

                    if (left > right) {
                        return direction === "asc" ? 1 : -1;
                    }

                    return 0;
                });

                return items;
            }

            function getFilteredAndSortedItems() {
                const filtered = state.items.filter((item) => {
                    const inSearch =
                        `${item.title} ${item.description || ""} ${item.assignee}`
                            .toLowerCase()
                            .includes(state.search.toLowerCase());
                    const inType =
                        state.type === "all" || item.type === state.type;
                    const inStatus =
                        state.status === "all" || item.status === state.status;
                    const inPriority =
                        state.priority === "all" ||
                        item.priority === state.priority;

                    return inSearch && inType && inStatus && inPriority;
                });

                return sortRecords(filtered, state.sortBy);
            }

            function renderSummaryChips(items) {
                const totals = {
                    all: items.length,
                    task: items.filter((item) => item.type === "task").length,
                    feature: items.filter((item) => item.type === "feature")
                        .length,
                    bug: items.filter((item) => item.type === "bug").length,
                    done: items.filter((item) => isDone(item)).length,
                };

                const pct =
                    totals.all > 0
                        ? Math.round((totals.done / totals.all) * 100)
                        : 0;
                nodes.summaryChips.innerHTML = "";
                [
                    `All: ${totals.all}`,
                    `Tasks: ${totals.task}`,
                    `Features: ${totals.feature}`,
                    `Bugs: ${totals.bug}`,
                    `Done: ${totals.done}/${totals.all} (${pct}%)`,
                ].forEach((label) => {
                    const chip = document.createElement("span");
                    chip.className = "chip";
                    chip.textContent = label;
                    nodes.summaryChips.appendChild(chip);
                });
            }

            function renderTable(items) {
                nodes.tableBody.innerHTML = "";

                if (!items.length) {
                    const row = document.createElement("tr");
                    row.innerHTML =
                        '<td colspan="8"><div class="empty">No matching records.</div></td>';
                    nodes.tableBody.appendChild(row);
                    return;
                }

                items.forEach((item) => {
                    const row = document.createElement("tr");
                    const safeTitle = escapeHtml(item.title);
                    const safeDescription = escapeHtml(item.description || "");
                    const safeAssignee = escapeHtml(item.assignee);

                    row.innerHTML = `
                        <td>
                            <div class="title-cell ${isDone(item) ? "is-done" : ""}">
                                <span class="status-dot dot-${toClassToken(item.status)}"></span>
                                <span class="table-text">${safeTitle}</span>
                            </div>
                        </td>
                        <td>
                            <span class="desc-text">${safeDescription || "—"}</span>
                        </td>
                        <td>
                            <span class="pill type-${item.type}">${item.type}</span>
                        </td>
                        <td>
                            <div class="status-radio-group">
                                <label class="status-option status-todo">
                                    <input type="radio" name="status-${item.id}" value="Todo" data-action="setStatus" data-id="${item.id}" ${item.status === "Todo" ? "checked" : ""} />
                                    <span>Todo</span>
                                </label>
                                <label class="status-option status-in-progress">
                                    <input type="radio" name="status-${item.id}" value="In Progress" data-action="setStatus" data-id="${item.id}" ${item.status === "In Progress" ? "checked" : ""} />
                                    <span>In Progress</span>
                                </label>
                                <label class="status-option status-done">
                                    <input type="radio" name="status-${item.id}" value="Done" data-action="setStatus" data-id="${item.id}" ${item.status === "Done" ? "checked" : ""} />
                                    <span>Done</span>
                                </label>
                            </div>
                        </td>
                        <td>
                            <div class="priority-radio-group">
                                <label class="priority-option priority-low">
                                    <input type="radio" name="priority-${item.id}" value="low" data-action="setPriority" data-id="${item.id}" ${item.priority === "low" ? "checked" : ""} />
                                    <span>Low</span>
                                </label>
                                <label class="priority-option priority-medium">
                                    <input type="radio" name="priority-${item.id}" value="medium" data-action="setPriority" data-id="${item.id}" ${item.priority === "medium" ? "checked" : ""} />
                                    <span>Med</span>
                                </label>
                                <label class="priority-option priority-high">
                                    <input type="radio" name="priority-${item.id}" value="high" data-action="setPriority" data-id="${item.id}" ${item.priority === "high" ? "checked" : ""} />
                                    <span>High</span>
                                </label>
                            </div>
                        </td>
                        <td>${safeAssignee}</td>
                        <td>${item.createdAt}</td>
                        <td>
                            <div class="actions-cell">
                            <button class="icon-button" type="button" data-action="viewRow" data-id="${item.id}" title="View">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                            <button class="icon-button" type="button" data-action="editRow" data-id="${item.id}" title="Edit">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                            </button>
                            <button class="icon-button icon-danger" type="button" data-action="deleteItem" data-id="${item.id}" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                            </button>
                            </div>
                        </td>
                    `;
                    nodes.tableBody.appendChild(row);
                });
            }

            function renderBoard(items) {
                const columns = ["Todo", "In Progress", "Done"];
                nodes.boardView.innerHTML = "";

                columns.forEach((status) => {
                    const group = items.filter(
                        (item) => item.status === status,
                    );
                    const columnSort =
                        state.boardControls[status] || "createdAt-desc";
                    const sortedGroup = sortRecords([...group], columnSort);
                    const col = document.createElement("section");
                    col.className = "column";
                    col.dataset.status = status;

                    const heading = document.createElement("h3");
                    heading.innerHTML = `<span>${status}</span><span>${group.length}</span>`;
                    col.appendChild(heading);

                    const controls = document.createElement("div");
                    controls.className = "column-controls";
                    controls.innerHTML = `
                        <select class="column-sort" data-action="columnSort" data-status="${status}">
                            <option value="createdAt-desc" ${columnSort === "createdAt-desc" ? "selected" : ""}>Newest first</option>
                            <option value="createdAt-asc" ${columnSort === "createdAt-asc" ? "selected" : ""}>Oldest first</option>
                            <option value="priority-desc" ${columnSort === "priority-desc" ? "selected" : ""}>Priority high-low</option>
                            <option value="priority-asc" ${columnSort === "priority-asc" ? "selected" : ""}>Priority low-high</option>
                            <option value="title-asc" ${columnSort === "title-asc" ? "selected" : ""}>Title A-Z</option>
                            <option value="title-desc" ${columnSort === "title-desc" ? "selected" : ""}>Title Z-A</option>
                        </select>
                        <form class="column-add" data-action="columnAdd" data-status="${status}">
                            <input
                                class="column-add-input"
                                name="title"
                                placeholder="Add to ${status}"
                                required
                            />
                            <button class="column-add-button" type="submit">Add</button>
                        </form>
                    `;
                    col.appendChild(controls);

                    if (!group.length) {
                        const empty = document.createElement("div");
                        empty.className = "empty";
                        empty.textContent = "No items";
                        col.appendChild(empty);
                    }

                    sortedGroup.forEach((item) => {
                        const card = document.createElement("article");
                        card.className = "card";
                        card.draggable = true;
                        card.dataset.id = String(item.id);
                        const safeTitle = escapeHtml(item.title);
                        const safeDescription = escapeHtml(
                            item.description || "",
                        );
                        const safeAssignee = escapeHtml(item.assignee);
                        card.innerHTML = `
                            <div class="card-head">
                                <span class="card-title ${isDone(item) ? "is-done" : ""}">${safeTitle}</span>
                                <div class="card-actions">
                                    <button class="action-button" type="button" data-action="viewRow" data-id="${item.id}">View</button>
                                    <button class="action-button" type="button" data-action="editRow" data-id="${item.id}">Edit</button>
                                    <button class="danger-button" type="button" data-action="deleteItem" data-id="${item.id}">Delete</button>
                                </div>
                            </div>
                            ${safeDescription ? `<p class="card-desc">${safeDescription}</p>` : ""}
                            <div class="card-meta">
                                <span class="pill type-${item.type}">${item.type}</span>
                                <span class="priority-${item.priority}">${item.priority}</span>
                            </div>
                            <div class="card-meta">
                                <span>${safeAssignee}</span>
                                <span>${item.createdAt}</span>
                            </div>
                        `;
                        col.appendChild(card);
                    });

                    nodes.boardView.appendChild(col);
                });
            }

            function render() {
                const computedItems = getFilteredAndSortedItems();

                nodes.tableView.classList.toggle(
                    "hidden",
                    state.view !== "table",
                );
                nodes.boardView.classList.toggle(
                    "hidden",
                    state.view !== "board",
                );
                nodes.tableViewBtn.classList.toggle(
                    "active",
                    state.view === "table",
                );
                nodes.boardViewBtn.classList.toggle(
                    "active",
                    state.view === "board",
                );

                renderSummaryChips(state.items);
                renderTable(computedItems);
                renderBoard(computedItems);
            }

            function updateItem(id, updater) {
                state.items = state.items.map((item) => {
                    if (item.id !== id) {
                        return item;
                    }
                    return updater(item);
                });

                persist();
                render();
            }

            function deleteItem(id) {
                state.items = state.items.filter((item) => item.id !== id);
                persist();
                render();
            }

            function findItemById(id) {
                return state.items.find((item) => item.id === id) || null;
            }

            function openAddModal() {
                nodes.addModal.classList.remove("hidden");
                nodes.addTitle.focus();
            }

            function closeAddModal(resetForm = false) {
                nodes.addModal.classList.add("hidden");

                if (resetForm) {
                    nodes.addForm.reset();
                }
            }

            function openEditModal(id) {
                const item = findItemById(id);
                if (!item) {
                    return;
                }

                state.editingItemId = id;
                nodes.editTitle.value = item.title;
                nodes.editDescription.value = item.description || "";
                nodes.editAssignee.value = item.assignee || "";

                setSelectedRadioValue(nodes.editForm, "editType", item.type);
                setSelectedRadioValue(
                    nodes.editForm,
                    "editStatus",
                    item.status,
                );
                setSelectedRadioValue(
                    nodes.editForm,
                    "editPriority",
                    item.priority,
                );

                nodes.editModal.classList.remove("hidden");
                nodes.editTitle.focus();
            }

            function closeEditModal(resetForm = false) {
                nodes.editModal.classList.add("hidden");
                state.editingItemId = null;

                if (resetForm) {
                    nodes.editForm.reset();
                }
            }

            function openViewModal(id) {
                const item = findItemById(id);
                if (!item) {
                    return;
                }

                const safeTitle = escapeHtml(item.title);
                const safeDescription = escapeHtml(
                    item.description || "No description provided.",
                );
                const safeType = escapeHtml(item.type);
                const safeStatus = escapeHtml(item.status);
                const safePriority = escapeHtml(item.priority);
                const safeAssignee = escapeHtml(item.assignee || "Unassigned");
                const safeCreatedAt = escapeHtml(item.createdAt);
                const safeUpdatedAt = item.updatedAt
                    ? escapeHtml(item.updatedAt)
                    : null;
                const statusClass = getStatusClass(item.status);

                nodes.viewContent.innerHTML = `
                    <section class="view-hero">
                        <h3 class="view-title">${safeTitle}</h3>
                        <p class="view-description">${safeDescription}</p>
                        <div class="view-meta-chips">
                            <span class="pill type-${safeType}">${safeType}</span>
                            <span class="view-chip ${statusClass}">${safeStatus}</span>
                            <span class="view-chip priority-${safePriority}">${safePriority}</span>
                        </div>
                    </section>
                    <section class="view-details">
                        <div class="view-row">
                            <span class="view-key">Assignee</span>
                            <span class="view-value">${safeAssignee}</span>
                        </div>
                        <div class="view-row">
                            <span class="view-key">Created</span>
                            <span class="view-value">${safeCreatedAt}</span>
                        </div>
                        ${safeUpdatedAt ? `<div class="view-row"><span class="view-key">Updated</span><span class="view-value">${safeUpdatedAt}</span></div>` : ""}
                        <div class="view-row">
                            <span class="view-key">Item ID</span>
                            <span class="view-value">${item.id}</span>
                        </div>
                    </section>
                `;

                nodes.viewModal.classList.remove("hidden");
            }

            function closeViewModal() {
                nodes.viewModal.classList.add("hidden");
            }

            function getSelectedRadioValue(form, name, fallback) {
                const selected = form.querySelector(
                    `input[name="${name}"]:checked`,
                );

                return selected ? selected.value : fallback;
            }

            function setSelectedRadioValue(form, name, value) {
                const target = form.querySelector(
                    `input[name="${name}"][value="${value}"]`,
                );

                if (target) {
                    target.checked = true;
                }
            }

            function registerEvents() {
                nodes.tableViewBtn.addEventListener("click", () => {
                    state.view = "table";
                    render();
                });

                nodes.boardViewBtn.addEventListener("click", () => {
                    state.view = "board";
                    render();
                });

                nodes.searchInput.addEventListener("input", (event) => {
                    state.search = event.target.value;
                    render();
                });

                nodes.typeFilter.addEventListener("change", (event) => {
                    state.type = event.target.value;
                    render();
                });

                nodes.statusFilter.addEventListener("change", (event) => {
                    state.status = event.target.value;
                    render();
                });

                nodes.priorityFilter.addEventListener("change", (event) => {
                    state.priority = event.target.value;
                    render();
                });

                nodes.sortBy.addEventListener("change", (event) => {
                    state.sortBy = event.target.value;
                    render();
                });

                nodes.openAddModalBtn.addEventListener("click", () => {
                    openAddModal();
                });

                nodes.closeAddModalBtn.addEventListener("click", () => {
                    closeAddModal(false);
                });

                nodes.cancelAddModalBtn.addEventListener("click", () => {
                    closeAddModal(true);
                });

                nodes.closeEditModalBtn.addEventListener("click", () => {
                    closeEditModal(false);
                });

                nodes.cancelEditModalBtn.addEventListener("click", () => {
                    closeEditModal(true);
                });

                nodes.closeViewModalBtn.addEventListener("click", () => {
                    closeViewModal();
                });

                nodes.dismissViewModalBtn.addEventListener("click", () => {
                    closeViewModal();
                });

                nodes.addModal.addEventListener("click", (event) => {
                    if (event.target === nodes.addModal) {
                        closeAddModal(false);
                    }
                });

                nodes.editModal.addEventListener("click", (event) => {
                    if (event.target === nodes.editModal) {
                        closeEditModal(false);
                    }
                });

                nodes.viewModal.addEventListener("click", (event) => {
                    if (event.target === nodes.viewModal) {
                        closeViewModal();
                    }
                });

                document.addEventListener("keydown", (event) => {
                    if (event.key !== "Escape") {
                        return;
                    }

                    if (!nodes.addModal.classList.contains("hidden")) {
                        closeAddModal(false);
                    }

                    if (!nodes.editModal.classList.contains("hidden")) {
                        closeEditModal(false);
                    }

                    if (!nodes.viewModal.classList.contains("hidden")) {
                        closeViewModal();
                    }
                });

                nodes.tableBody.addEventListener("change", (event) => {
                    const action = event.target.dataset.action;
                    const id = Number(event.target.dataset.id);

                    if (!action || !id) {
                        return;
                    }

                    if (action === "setPriority") {
                        updateItem(id, (item) => ({
                            ...item,
                            priority: event.target.value,
                        }));
                    }

                    if (action === "setStatus") {
                        updateItem(id, (item) => ({
                            ...item,
                            status: event.target.value,
                            updatedAt: new Date().toISOString().slice(0, 10),
                        }));
                    }
                });

                nodes.tableBody.addEventListener("click", (event) => {
                    const action = event.target.dataset.action;
                    const id = Number(event.target.dataset.id);

                    if (!action || !id) {
                        return;
                    }

                    if (action === "viewRow") {
                        openViewModal(id);
                    }

                    if (action === "editRow") {
                        openEditModal(id);
                    }

                    if (action === "deleteItem") {
                        const shouldDelete = window.confirm(
                            "Delete this item permanently?",
                        );

                        if (!shouldDelete) {
                            return;
                        }

                        deleteItem(id);
                    }
                });

                nodes.addForm.addEventListener("submit", (event) => {
                    event.preventDefault();

                    const title = nodes.addTitle.value.trim();
                    if (!title) {
                        return;
                    }

                    const item = {
                        id: Date.now(),
                        title,
                        description: nodes.addDescription.value.trim(),
                        type: getSelectedRadioValue(
                            nodes.addForm,
                            "addType",
                            "task",
                        ),
                        status: getSelectedRadioValue(
                            nodes.addForm,
                            "addStatus",
                            "Todo",
                        ),
                        priority: getSelectedRadioValue(
                            nodes.addForm,
                            "addPriority",
                            "medium",
                        ),
                        assignee:
                            nodes.addAssignee.value.trim() || "Unassigned",
                        createdAt: new Date().toISOString().slice(0, 10),
                    };

                    state.items.unshift(item);
                    nodes.addForm.reset();
                    persist();
                    render();
                    closeAddModal(false);
                });

                nodes.editForm.addEventListener("submit", (event) => {
                    event.preventDefault();

                    if (!state.editingItemId) {
                        return;
                    }

                    const title = nodes.editTitle.value.trim();
                    if (!title) {
                        return;
                    }

                    updateItem(state.editingItemId, (item) => {
                        const nextStatus = getSelectedRadioValue(
                            nodes.editForm,
                            "editStatus",
                            item.status,
                        );

                        return {
                            ...item,
                            title,
                            description: nodes.editDescription.value.trim(),
                            type: getSelectedRadioValue(
                                nodes.editForm,
                                "editType",
                                item.type,
                            ),
                            status: nextStatus,
                            priority: getSelectedRadioValue(
                                nodes.editForm,
                                "editPriority",
                                item.priority,
                            ),
                            assignee:
                                nodes.editAssignee.value.trim() || "Unassigned",
                            updatedAt: new Date().toISOString().slice(0, 10),
                        };
                    });

                    closeEditModal(false);
                });

                nodes.boardView.addEventListener("dragstart", (event) => {
                    const card = event.target.closest(".card");
                    if (!card) {
                        return;
                    }

                    card.classList.add("dragging");
                    event.dataTransfer.effectAllowed = "move";
                    event.dataTransfer.setData(
                        "text/plain",
                        card.dataset.id || "",
                    );
                });

                nodes.boardView.addEventListener("dragend", (event) => {
                    const card = event.target.closest(".card");
                    if (card) {
                        card.classList.remove("dragging");
                    }

                    nodes.boardView
                        .querySelectorAll(".column")
                        .forEach((column) => {
                            column.classList.remove("drop-target");
                        });
                });

                nodes.boardView.addEventListener("dragover", (event) => {
                    const column = event.target.closest(".column");
                    if (!column) {
                        return;
                    }

                    event.preventDefault();
                    event.dataTransfer.dropEffect = "move";

                    nodes.boardView
                        .querySelectorAll(".column")
                        .forEach((entry) => {
                            entry.classList.remove("drop-target");
                        });
                    column.classList.add("drop-target");
                });

                nodes.boardView.addEventListener("drop", (event) => {
                    const column = event.target.closest(".column");
                    if (!column) {
                        return;
                    }

                    event.preventDefault();
                    const id = Number(event.dataTransfer.getData("text/plain"));
                    const nextStatus = column.dataset.status;

                    if (!id || !nextStatus) {
                        return;
                    }

                    updateItem(id, (item) => ({
                        ...item,
                        status: nextStatus,
                    }));
                });

                nodes.boardView.addEventListener("change", (event) => {
                    if (event.target.dataset.action !== "columnSort") {
                        return;
                    }

                    const status = event.target.dataset.status;
                    if (!status) {
                        return;
                    }

                    state.boardControls[status] = event.target.value;
                    render();
                });

                nodes.boardView.addEventListener("submit", (event) => {
                    const form = event.target.closest(
                        "form[data-action='columnAdd']",
                    );
                    if (!form) {
                        return;
                    }

                    event.preventDefault();
                    const status = form.dataset.status;
                    const input = form.querySelector("input[name='title']");

                    if (!status || !input) {
                        return;
                    }

                    const title = input.value.trim();
                    if (!title) {
                        return;
                    }

                    const item = {
                        id: Date.now(),
                        title,
                        description: "",
                        type: "task",
                        status,
                        priority: "medium",
                        assignee: "Unassigned",
                        createdAt: new Date().toISOString().slice(0, 10),
                    };

                    state.items.unshift(item);
                    persist();
                    render();
                });

                nodes.boardView.addEventListener("click", (event) => {
                    const action = event.target.dataset.action;
                    const id = Number(event.target.dataset.id);

                    if (!action || !id) {
                        return;
                    }

                    if (action === "viewRow") {
                        openViewModal(id);
                        return;
                    }

                    if (action === "editRow") {
                        openEditModal(id);
                        return;
                    }

                    if (action === "deleteItem") {
                        const shouldDelete = window.confirm(
                            "Delete this item permanently?",
                        );

                        if (!shouldDelete) {
                            return;
                        }

                        deleteItem(id);
                    }
                });
            }

            async function bootstrap() {
                const saved = localStorage.getItem(STORAGE_KEY);

                if (saved) {
                    const cached = JSON.parse(saved);
                    state.boardControls = {
                        ...state.boardControls,
                        ...(cached.boardControls || {}),
                    };
                    if (cached.view) {
                        state.view = cached.view;
                    }
                    if (cached.sortBy) {
                        state.sortBy = cached.sortBy;
                        nodes.sortBy.value = cached.sortBy;
                    }
                }

                const response = await fetch("tasks.json");
                const data = await response.json();
                const normalized = normalizeIncomingData(data);

                state.title = normalized.title;
                state.items = normalized.items;
                nodes.title.textContent = state.title;

                registerEvents();
                render();
            }

            bootstrap().catch(() => {
                nodes.title.textContent = "Unable to load tasks.json";
            });

            /* ── Theme toggle ─────────────────────────────────────── */
            (function initTheme() {
                const root = document.documentElement;
                const btn = document.getElementById("themeToggleBtn");
                const moon = document.getElementById("iconMoon");
                const sun = document.getElementById("iconSun");

                const saved = localStorage.getItem("theme");
                const sysDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                const isDark = saved === "dark" || (!saved && sysDark);

                function applyTheme(dark) {
                    root.setAttribute("data-theme", dark ? "dark" : "light");
                    moon.style.display = dark ? "none" : "block";
                    sun.style.display = dark ? "block" : "none";
                    btn.title = dark
                        ? "Switch to light mode"
                        : "Switch to dark mode";
                }

                applyTheme(isDark);

                btn.addEventListener("click", () => {
                    const nowDark = root.getAttribute("data-theme") !== "dark";
                    localStorage.setItem("theme", nowDark ? "dark" : "light");
                    applyTheme(nowDark);
                });
            })();
        </script>
    </body>
</html>
