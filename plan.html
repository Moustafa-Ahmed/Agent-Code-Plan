            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Space Grotesk", "Segoe UI", sans-serif;
                color: var(--ink);
                background:
                    radial-gradient(
                        circle at 0% 0%,
                        var(--body-glow1) 0%,
                        transparent 44%
                    ),
                    radial-gradient(
                        circle at 100% 100%,
                        var(--body-glow2) 0%,
                        transparent 34%
                    ),
                    var(--bg);
                transition:
                    background-color 0.25s,
                    color 0.25s;
            }

            .shell {
                max-width: 1420px;
                margin: 0 auto;
                padding: 28px 16px;
            }

            .header {
                background: var(--header-bg);
                border: 1px solid var(--header-border);
                border-radius: 18px;
                box-shadow: var(--shadow);
                padding: 20px;
                margin-bottom: 14px;
            }

            .title-row {
                display: flex;
                gap: 12px;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
            }

            h1 {
                margin: 0;
                font-size: clamp(1.45rem, 2.6vw, 2.1rem);
                letter-spacing: -0.02em;
            }

            .subtext {
                margin: 4px 0 0;
                color: var(--muted);
                font-size: 0.95rem;
            }

            .chips {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            .chip {
                border-radius: 7px;
                border: 1px solid var(--chip-border);
                background: var(--chip-bg);
                padding: 5px 10px 5px 26px;
                font-size: 0.8rem;
                font-weight: 500;
                color: var(--chip-color);
                position: relative;
            }

            .chip::before {
                content: "";
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 7px;
                height: 7px;
                border-radius: 999px;
                background: var(--chip-dot-1);
            }

            .chips .chip:nth-child(1)::before {
                background: var(--chip-dot-1);
            }
            .chips .chip:nth-child(2)::before {
                background: var(--chip-dot-2);
            }
            .chips .chip:nth-child(3)::before {
                background: var(--chip-dot-3);
            }
            .chips .chip:nth-child(4)::before {
                background: var(--chip-dot-4);
            }
            .chips .chip:nth-child(5)::before {
                background: var(--chip-dot-5);
            }

            /* ── Theme toggle ──────────────────────────────────────── */
            .theme-toggle {
                border: 1px solid var(--chip-border);
                border-radius: 8px;
                background: var(--chip-bg);
                color: var(--muted);
                width: 34px;
                height: 34px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                padding: 0;
                flex-shrink: 0;
                transition:
                    background 0.15s,
                    border-color 0.15s,
                    color 0.15s;
            }

            .theme-toggle:hover {
                background: var(--accent-soft);
                border-color: var(--accent);
                color: var(--accent);
            }

            .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 14px;
                box-shadow: var(--shadow);
                overflow: hidden;
            }

            .toolbar {
                border-bottom: 1px solid var(--line);
            }

            .toolbar-main {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 14px;
                border-bottom: 1px solid var(--line3);
            }

            .toolbar-search {
                flex: 1;
            }

            .toolbar-filters {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 9px 14px;
                background: var(--panel2);
            }

            .toolbar-filters .select {
                width: auto;
                flex: 0 0 auto;
                min-width: 130px;
            }

            .sort-select {
                min-width: 160px;
                margin-left: auto;
            }

            .view-toggle {
                display: inline-flex;
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 2px;
                background: var(--view-toggle-bg);
            }

            button,
            select,
            input {
                font: inherit;
            }

            .view-button {
                border: 0;
                border-radius: 8px;
                padding: 7px 12px;
                background: transparent;
                cursor: pointer;
                color: var(--muted);
            }

            .view-button.active {
                color: #fff;
                background: var(--accent);
            }

            .input,
            .select,
            .add-input,
            .add-select {
                width: 100%;
                border: 1px solid var(--input-border);
                border-radius: 10px;
                padding: 8px 10px;
                background: var(--input-bg);
                color: var(--ink);
                transition:
                    border-color 0.15s,
                    box-shadow 0.15s;
            }

            .input:focus,
            .select:focus,
            .add-input:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--input-focus-ring);
            }

            .select {
                appearance: none;
                -webkit-appearance: none;
                background-image: var(--select-arrow);
                background-repeat: no-repeat;
                background-position: right 10px center;
                padding-right: 28px;
            }

            .table-wrap {
                overflow-x: auto;
            }

            table {
                border-collapse: collapse;
                width: 100%;
                min-width: 1360px;
            }

            th,
            td {
                border-bottom: 1px solid var(--line);
                padding: 10px;
                text-align: left;
                vertical-align: middle;
                white-space: nowrap;
            }

            th {
                background: var(--th-bg);
                font-size: 0.75rem;
                font-weight: 600;
                color: var(--th-color);
                letter-spacing: 0.06em;
                text-transform: uppercase;
                position: sticky;
                top: 0;
                z-index: 1;
                border-bottom: 2px solid var(--th-border);
            }

            tbody tr {
                transition: background 0.1s;
            }

            tbody tr:hover td {
                background: var(--row-hover);
            }

            .title-cell {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .description-input {
                min-width: 220px;
            }

            .description-textarea {
                resize: vertical;
                min-height: 72px;
                line-height: 1.35;
            }

            .table-description {
                min-height: 44px;
            }

            .status-dot {
                width: 9px;
                height: 9px;
                border-radius: 999px;
                display: inline-block;
            }

            .dot-Todo {
                background: var(--todo-dot);
            }
            .dot-InProgress {
                background: var(--progress-dot);
            }
            .dot-Done {
                background: var(--ok);
            }

            .status-radio-group {
                display: inline-flex;
                gap: 4px;
                align-items: center;
            }

            .status-option {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                border: 1px solid var(--radio-border);
                border-radius: 999px;
                padding: 4px 8px;
                font-size: 0.74rem;
                cursor: pointer;
                line-height: 1;
                background: transparent;
                color: var(--radio-muted);
                transition:
                    background 0.12s,
                    color 0.12s,
                    border-color 0.12s;
                user-select: none;
            }

            .status-option input[type="radio"] {
                margin: 0;
                width: 0;
                height: 0;
                position: absolute;
                opacity: 0;
                pointer-events: none;
            }

            .status-option:hover.status-todo {
                color: var(--status-todo-active-color);
                background: var(--status-todo-active-bg);
                border-color: var(--status-todo-active-border);
            }
            .status-option:hover.status-in-progress {
                color: var(--status-in-progress-color);
                background: var(--status-in-progress-bg);
                border-color: var(--status-in-progress-border);
            }
            .status-option:hover.status-done {
                color: var(--status-done-color);
                background: var(--status-done-bg);
                border-color: var(--status-done-border);
            }

            .status-option.status-todo:has(input:checked) {
                color: var(--status-todo-active-color);
                background: var(--status-todo-active-bg);
                border-color: var(--status-todo-active-border);
                font-weight: 600;
            }
            .status-option.status-in-progress:has(input:checked) {
                color: var(--status-in-progress-color);
                background: var(--status-in-progress-bg);
                border-color: var(--status-in-progress-border);
                font-weight: 600;
            }
            .status-option.status-done:has(input:checked) {
                color: var(--status-done-color);
                background: var(--status-done-bg);
                border-color: var(--status-done-border);
                font-weight: 600;
            }

            .pill {
                padding: 4px 8px;
                border-radius: 999px;
                font-size: 0.77rem;
                border: 1px solid transparent;
            }

            .type-task {
                background: var(--type-task-bg);
                color: var(--type-task-color);
                border-color: var(--type-task-border);
            }
            .type-feature {
                background: var(--type-feature-bg);
                color: var(--type-feature-color);
                border-color: var(--type-feature-border);
            }
            .type-bug {
                background: var(--type-bug-bg);
                color: var(--type-bug-color);
                border-color: var(--type-bug-border);
            }

            .priority-high {
                color: var(--high);
            }
            .priority-medium {
                color: var(--medium);
            }
            .priority-low {
                color: var(--low);
            }

            .board {
                display: grid;
                gap: 12px;
                grid-template-columns: repeat(3, minmax(220px, 1fr));
                padding: 14px;
            }

            .column {
                background: var(--col-bg);
                border: 1px solid var(--line);
                border-radius: 12px;
                padding: 10px;
                min-height: 240px;
            }

            .column h3 {
                margin: 0 0 10px;
                font-size: 0.88rem;
                font-weight: 600;
                color: var(--col-h3-color);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .column h3 span:last-child {
                background: var(--accent-soft);
                color: var(--accent);
                font-size: 0.75rem;
                font-weight: 700;
                min-width: 22px;
                height: 22px;
                border-radius: 999px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0 7px;
            }

            .column-controls {
                display: grid;
                gap: 8px;
                margin-bottom: 10px;
            }

            .column-sort {
                width: 100%;
                border: 1px solid var(--sortby-border);
                border-radius: 8px;
                padding: 6px 8px;
                background: var(--input-bg);
                color: var(--ink);
                font-size: 0.82rem;
            }

            .column-add {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 6px;
            }

            .column-add-input {
                border: 1px solid var(--sortby-border);
                border-radius: 8px;
                padding: 6px 8px;
                background: var(--input-bg);
                color: var(--ink);
                font-size: 0.82rem;
            }

            .column-add-button {
                border: 1px solid var(--col-add-border);
                border-radius: 8px;
                padding: 6px 9px;
                background: var(--col-add-bg);
                color: var(--col-add-color);
                font-size: 0.8rem;
                cursor: pointer;
            }

            .card {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 10px;
                padding: 10px;
                margin-bottom: 10px;
                cursor: grab;
                transition:
                    transform 0.15s ease,
                    box-shadow 0.15s ease;
            }

            .card:hover {
                box-shadow: 0 4px 16px rgba(30, 50, 100, 0.1);
                border-color: var(--accent);
            }

            .card:active {
                cursor: grabbing;
            }

            .card.dragging {
                opacity: 0.65;
                transform: rotate(1deg) scale(0.99);
            }

            .column.drop-target {
                border-color: var(--accent);
                background: var(--accent-soft);
            }

            .card:last-child {
                margin-bottom: 0;
            }

            .card-title {
                display: block;
                font-weight: 600;
                margin-bottom: 6px;
            }

            .card-meta {
                display: flex;
                justify-content: space-between;
                gap: 6px;
                align-items: center;
                font-size: 0.8rem;
                color: var(--muted);
            }

            .card-desc {
                margin: 2px 0 8px;
                color: var(--card-desc);
                font-size: 0.82rem;
                white-space: pre-line;
                line-height: 1.35;
            }

            .card-head {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 8px;
                margin-bottom: 6px;
            }

            .card-actions {
                display: flex;
                gap: 4px;
                flex-shrink: 0;
            }

            .danger-button {
                border: 1px solid var(--danger-border);
                border-radius: 8px;
                padding: 5px 8px;
                background: var(--danger-bg);
                color: var(--danger-color);
                font-size: 0.75rem;
                line-height: 1;
                cursor: pointer;
            }

            .empty {
                color: var(--muted);
                font-size: 0.85rem;
                text-align: center;
                padding: 10px;
                border: 1px dashed var(--empty-border);
                border-radius: 10px;
                background: var(--card-bg);
            }

            .panel-actions {
                padding: 12px;
                border-top: 1px solid var(--line);
                background: var(--panel-actions-bg);
                display: flex;
                justify-content: flex-end;
            }

            .add-button {
                border: 0;
                background: var(--accent);
                color: #fff;
                border-radius: 10px;
                padding: 9px 18px;
                cursor: pointer;
                font-weight: 600;
                letter-spacing: 0.01em;
                box-shadow: 0 2px 8px var(--accent-shadow);
                transition:
                    background 0.15s,
                    box-shadow 0.15s,
                    transform 0.1s;
            }

            .add-button:hover {
                background: var(--accent-hover);
                box-shadow: 0 4px 14px var(--accent-shadow-hover);
                transform: translateY(-1px);
            }

            .add-button:active {
                transform: translateY(0);
                box-shadow: 0 1px 4px var(--accent-shadow);
            }

            .modal {
                position: fixed;
                inset: 0;
                display: grid;
                place-items: center;
                padding: 16px;
                background: var(--modal-overlay);
                z-index: 20;
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
            }

            .modal-card {
                width: min(760px, 100%);
                background: var(--modal-bg);
                border: 1px solid var(--modal-border);
                border-radius: 14px;
                box-shadow: var(--shadow-modal);
                overflow: hidden;
            }

            .modal-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                padding: 12px 14px;
                border-bottom: 1px solid var(--modal-head-border);
            }

            .modal-title {
                margin: 0;
                font-size: 1rem;
            }

            .ghost-button {
                border: 1px solid var(--ghost-btn-border);
                border-radius: 8px;
                background: var(--modal-bg);
                color: var(--ghost-btn-color);
                padding: 7px 10px;
                cursor: pointer;
            }

            .add-modal-form {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 14px;
            }

            .modal-radio-section {
                border: 1px solid var(--modal-radio-border);
                border-radius: 10px;
                padding: 8px;
                margin: 0;
                background: var(--modal-radio-bg);
            }

            .modal-radio-label {
                color: var(--modal-radio-label);
                font-size: 0.78rem;
                padding: 0 4px;
            }

            .modal-radio-group {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }

            .modal-radio-option {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                border: 1px solid var(--modal-radio-option-border);
                border-radius: 999px;
                padding: 4px 8px;
                font-size: 0.78rem;
                cursor: pointer;
                line-height: 1;
            }

            .modal-radio-option input[type="radio"] {
                margin: 0;
            }

            .modal-radio-option input[type="radio"]:checked + span {
                font-weight: 700;
            }

            .modal-radio-option:has(input[type="radio"]:checked) {
                box-shadow: inset 0 0 0 2px currentColor;
                transform: translateY(-1px);
            }

            .type-option-task {
                background: var(--type-task-bg);
                color: var(--type-task-color);
                border-color: var(--type-task-border);
            }
            .type-option-feature {
                background: var(--type-feature-bg);
                color: var(--type-feature-color);
                border-color: var(--type-feature-border);
            }
            .type-option-bug {
                background: var(--type-bug-bg);
                color: var(--type-bug-color);
                border-color: var(--type-bug-border);
            }

            .priority-option-high {
                background: var(--priority-high-bg);
                color: var(--priority-high-color);
                border-color: var(--priority-high-border);
            }
            .priority-option-medium {
                background: var(--priority-medium-bg);
                color: var(--priority-medium-color);
                border-color: var(--priority-medium-border);
            }
            .priority-option-low {
                background: var(--priority-low-bg);
                color: var(--priority-low-color);
                border-color: var(--priority-low-border);
            }

            .add-modal-form .full {
                grid-column: span 2;
            }

            .modal-actions {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                grid-column: span 2;
                padding-top: 4px;
            }

            .field-group {
                display: grid;
                gap: 4px;
            }

            .field-label {
                font-size: 0.8rem;
                color: var(--field-label-color);
            }

            .table-text {
                max-width: 200px;
                white-space: normal;
                line-height: 1.35;
            }

            .desc-text {
                max-width: 220px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                white-space: normal;
                line-height: 1.4;
                color: var(--desc-color);
            }

            .priority-radio-group {
                display: inline-flex;
                gap: 4px;
                align-items: center;
            }

            .priority-option {
                display: inline-flex;
                align-items: center;
                border: 1px solid var(--radio-border);
                border-radius: 999px;
                padding: 4px 8px;
                font-size: 0.74rem;
                cursor: pointer;
                line-height: 1;
                background: transparent;
                color: var(--radio-muted);
                transition:
                    background 0.12s,
                    color 0.12s,
                    border-color 0.12s;
                user-select: none;
            }

            .priority-option input[type="radio"] {
                margin: 0;
                width: 0;
                height: 0;
                position: absolute;
                opacity: 0;
                pointer-events: none;
            }

            .priority-option:hover.priority-low {
                color: var(--priority-low-color);
                background: var(--priority-low-bg);
                border-color: var(--priority-low-border);
            }
            .priority-option:hover.priority-medium {
                color: var(--priority-medium-color);
                background: var(--priority-medium-bg);
                border-color: var(--priority-medium-border);
            }
            .priority-option:hover.priority-high {
                color: var(--priority-high-color);
                background: var(--priority-high-bg);
                border-color: var(--priority-high-border);
            }

            .priority-option.priority-low:has(input:checked) {
                color: var(--priority-low-color);
                background: var(--priority-low-bg);
                border-color: var(--priority-low-border);
                font-weight: 600;
            }
            .priority-option.priority-medium:has(input:checked) {
                color: var(--priority-medium-color);
                background: var(--priority-medium-bg);
                border-color: var(--priority-medium-border);
                font-weight: 600;
            }
            .priority-option.priority-high:has(input:checked) {
                color: var(--priority-high-color);
                background: var(--priority-high-bg);
                border-color: var(--priority-high-border);
                font-weight: 600;
            }

            .icon-button {
                border: 1px solid var(--icon-btn-border);
                border-radius: 7px;
                background: var(--icon-btn-bg);
                color: var(--icon-btn-color);
                width: 30px;
                height: 30px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                padding: 0;
                flex-shrink: 0;
                transition:
                    background 0.12s,
                    border-color 0.12s,
                    color 0.12s;
            }

            .icon-button:hover {
                background: var(--icon-btn-hover-bg);
                border-color: var(--icon-btn-hover-border);
                color: var(--accent);
            }

            .icon-button.icon-danger {
                color: var(--danger-color);
                border-color: var(--danger-border);
                background: var(--danger-bg);
            }

            .icon-button.icon-danger:hover {
                background: var(--danger-hover-bg);
                border-color: var(--danger-hover-border);
            }

            .action-button {
                border: 1px solid var(--icon-btn-border);
                border-radius: 8px;
                background: var(--icon-btn-bg);
                color: var(--ghost-btn-color);
                padding: 5px 9px;
                font-size: 0.75rem;
                font-weight: 500;
                line-height: 1;
                cursor: pointer;
                transition:
                    background 0.12s,
                    border-color 0.12s;
            }

            .action-button:hover {
                background: var(--icon-btn-hover-bg);
                border-color: var(--icon-btn-hover-border);
            }

            .danger-button:hover {
                background: var(--danger-hover-bg);
                border-color: var(--danger-hover-border);
            }

            .actions-cell {
                display: flex;
                gap: 5px;
                align-items: center;
            }

            .view-grid {
                padding: 14px;
                display: grid;
                gap: 10px;
            }

            .view-grid p {
                margin: 0;
                color: var(--ink2);
                white-space: pre-line;
            }

            .view-grid strong {
                color: var(--field-label-color);
                font-size: 0.82rem;
                margin-right: 6px;
            }

            .view-hero {
                display: grid;
                gap: 8px;
                padding: 14px;
                border-bottom: 1px solid var(--view-hero-border);
                background: var(--view-hero-bg);
            }

            .view-title {
                margin: 0;
                font-size: 1.16rem;
                line-height: 1.3;
            }

            .view-description {
                margin: 0;
                color: var(--desc-color);
                white-space: pre-line;
            }

            .view-meta-chips {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
            }

            .view-chip {
                display: inline-flex;
                align-items: center;
                border: 1px solid var(--radio-border);
                border-radius: 999px;
                padding: 4px 8px;
                font-size: 0.76rem;
            }

            .view-details {
                padding: 14px;
                display: grid;
                gap: 8px;
            }

            .view-row {
                display: grid;
                grid-template-columns: 110px 1fr;
                gap: 10px;
                align-items: start;
            }

            .view-key {
                color: var(--view-key-color);
                font-size: 0.8rem;
            }

            .view-value {
                color: var(--ink2);
                white-space: pre-line;
            }

            .hidden {
                display: none;
            }

            @media (max-width: 960px) {
                .board {
                    grid-template-columns: 1fr;
                }

                .add-modal-form {
                    grid-template-columns: 1fr;
                }

                .add-modal-form .full,
                .modal-actions {
                    grid-column: span 1;
                }
            }

            @media (max-width: 720px) {
                .toolbar-filters {
                    flex-wrap: wrap;
                }

                .toolbar-filters .select {
                    flex: 1 1 calc(50% - 8px);
                }

                .sort-select {
                    flex: 1 1 100%;
                    margin-left: 0;
                    max-width: none;
                }
            }

            @media (max-width: 620px) {
                .toolbar-main {
                    flex-wrap: wrap;
                }

                .view-toggle {
                    flex-shrink: 0;
                }

                .toolbar-search {
                    flex: 1 1 100%;
                }

                .chips {
                    margin-top: 10px;
                }
            }

            .is-done {
                text-decoration: line-through;
                color: var(--is-done-color);
            }
        </style>
    </head>

    <body>
        <main class="shell">
            <section class="header">
                <div class="title-row">
                    <div>
                        <h1 id="title">Project Database</h1>
                        <p class="subtext">
                            A single source of truth for tasks, features, and
                            bugs.
                        </p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px">
                        <div class="chips" id="summaryChips"></div>
                        <button
                            id="themeToggleBtn"
                            class="theme-toggle"
                            type="button"
                            title="Toggle dark mode"
                            aria-label="Toggle dark mode"
                        >
                            <svg
                                id="iconMoon"
                                xmlns="http://www.w3.org/2000/svg"
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                                />
                            </svg>
                            <svg
                                id="iconSun"
                                xmlns="http://www.w3.org/2000/svg"
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                style="display: none"
                            >
                                <circle cx="12" cy="12" r="5" />
                                <line x1="12" y1="1" x2="12" y2="3" />
                                <line x1="12" y1="21" x2="12" y2="23" />
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                                <line
                                    x1="18.36"
                                    y1="18.36"
                                    x2="19.78"
                                    y2="19.78"
                                />
                                <line x1="1" y1="12" x2="3" y2="12" />
                                <line x1="21" y1="12" x2="23" y2="12" />
                                <line
                                    x1="4.22"
                                    y1="19.78"
                                    x2="5.64"
                                    y2="18.36"
                                />
                                <line
                                    x1="18.36"
                                    y1="5.64"
                                    x2="19.78"
                                    y2="4.22"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="toolbar">
                    <div class="toolbar-main">
                        <div
                            class="view-toggle"
                            role="tablist"
                            aria-label="View selector"
                        >
                            <button
                                id="tableViewBtn"
                                class="view-button active"
                                type="button"
                            >
                                Table
                            </button>
                            <button
                                id="boardViewBtn"
                                class="view-button"
                                type="button"
                            >
                                Board
                            </button>
                        </div>
                        <input
                            id="searchInput"
                            class="input toolbar-search"
                            type="search"
                            placeholder="Search title or assignee"
                        />
                    </div>
                    <div class="toolbar-filters">
                        <select id="typeFilter" class="select">
                            <option value="all">All Types</option>
                            <option value="task">Task</option>
                            <option value="feature">Feature</option>
                            <option value="bug">Bug</option>
                        </select>
                        <select id="statusFilter" class="select">
                            <option value="all">All Status</option>
                            <option value="Todo">Todo</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                        <select id="priorityFilter" class="select">
                            <option value="all">All Priorities</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <select id="sortBy" class="select sort-select">
                            <option value="createdAt-desc">Newest first</option>
                            <option value="createdAt-asc">Oldest first</option>
                            <option value="priority-desc">
                                Priority High → Low
                            </option>
                            <option value="priority-asc">
                                Priority Low → High
                            </option>
                            <option value="title-asc">Title A → Z</option>
                            <option value="title-desc">Title Z → A</option>
                        </select>
                    </div>
                </div>

                <div id="tableView" class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Assignee</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div id="boardView" class="hidden board"></div>

                <div class="panel-actions">
                    <button
